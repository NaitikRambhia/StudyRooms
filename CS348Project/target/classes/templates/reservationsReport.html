<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Reservation Report</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
      background-color: #0d0d0d;
      color: #f2f2f2;
    }
    h1 {
      text-align: center;
      color: #ffa64d;
    }
    .container {
      max-width: 900px;
      margin: 0 auto;
      background: #1a1a1a;
      padding: 25px;
      border-radius: 12px;
      box-shadow: 0 2px 12px rgba(255, 165, 0, 0.15);
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 25px;
      background: #1a1a1a;
      border-radius: 8px;
      overflow: hidden;
    }
    th {
      background-color: #ff8c1a;
      color: black;
      padding: 12px;
      text-align: left;
      cursor: pointer;
    }
    td {
      padding: 12px;
      border-bottom: 1px solid #333;
    }
    tr:hover {
      background-color: #262626;
    }
    button, a {
      background-color: #ff8c1a;
      color: black;
      padding: 10px 15px;
      border-radius: 6px;
      text-decoration: none;
      font-weight: bold;
      border: none;
      cursor: pointer;
    }
    button:hover, a:hover {
      background-color: #e67a00;
    }
  </style>
</head>
<body>

<button onclick="window.location.href='/'">Home</button>

<div class="container">
  <h1>Reservation Report</h1>

  <table id="reservationsTable">
    <thead>
    <tr>
      <th onclick="sortTable(0)">Reservation ID</th>
      <th onclick="sortTable(1)">Room ID</th>
      <th onclick="sortTable(2)">Student</th>
      <th onclick="sortTable(3)">Start Time</th>
      <th onclick="sortTable(4)">End Time</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="r : ${reservations}">
      <td th:text="${r.reservationId}"></td>
      <td th:text="${r.roomId}"></td>
      <td th:text="${r.studentName}"></td>

      <!-- Format timestamps nicely -->
      <td th:text="${#temporals.format(r.startTime, 'MMM dd yyyy, hh:mm a')}"></td>
      <td th:text="${#temporals.format(r.endTime, 'MMM dd yyyy, hh:mm a')}"></td>
    </tr>
    </tbody>
  </table>

  <br>
  <a href="/reportPage">Back to Reports</a>
</div>

<script>
  function sortTable(colIndex) {
    const table = document.getElementById("reservationsTable");
    const tbody = table.tBodies[0];
    const rows = Array.from(tbody.rows);

    const sorted = rows.sort((a, b) => {
      let A = a.cells[colIndex].innerText.trim();
      let B = b.cells[colIndex].innerText.trim();
      return A.localeCompare(B);
    });

    if (tbody.getAttribute("data-sorted") === String(colIndex)) {
      sorted.reverse();
      tbody.setAttribute("data-sorted", "");
    } else {
      tbody.setAttribute("data-sorted", String(colIndex));
    }

    sorted.forEach(row => tbody.appendChild(row));
  }
</script>

</body>
</html>
